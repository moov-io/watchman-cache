worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging with cache status for debugging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" cache:$upstream_cache_status '
                    'rt:$request_time uct:$upstream_connect_time uht:$upstream_header_time urt:$upstream_response_time';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # DNS resolver for dynamic resolution (helps with https backends).
    # Force IPv4 to avoid "Network unreachable" on AAAA-only records for some gov/S3/Azure endpoints
    # (observed in logs as connect() to [2600:...]:443 failures).
    resolver 8.8.8.8 8.8.4.4 1.1.1.1 valid=30s ipv6=off;

    # Cache zone: 10m keys, up to 1GB, 7d inactive eviction.
    # Long inactive helps keep complete good copies in the named volume across
    # restarts and quiet periods. use_temp_path=off for atomic writes (no partial bodies).
    proxy_cache_path /var/cache/nginx
        levels=1:2
        keys_zone=watchman_cache:10m
        max_size=1g
        inactive=7d
        use_temp_path=off;

    # Temp directory for buffering large upstream responses to disk when they exceed memory buffers.
    proxy_temp_path /var/cache/nginx/temp 1 2;
    proxy_max_temp_file_size 1024m;

    # Default cache behavior (24h for successful responses)
    proxy_cache watchman_cache;
    proxy_cache_valid 200 24h;
    proxy_cache_valid 404 1m;
    proxy_cache_valid 500 502 503 504 1m;
    proxy_cache_key "$scheme$request_method$host$request_uri";

    # Serve stale content on errors / while updating (resilience). Critical for flaky gov origins.
    proxy_cache_use_stale error timeout invalid_header updating
                          http_500 http_502 http_503 http_504;

    proxy_cache_background_update on;
    proxy_cache_lock on;
    proxy_cache_lock_timeout 180s;   # Allow slow first fetch of 2MB+ CSVs to complete

    # nginx-level retries for transient upstream failures (premature close, timeouts, 5xx).
    # This is the primary defense against "upstream prematurely closed connection while reading upstream".
    proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
    proxy_next_upstream_tries 3;

    # Proxy defaults suitable for list downloads (CSVs up to a few MB, XML, HTML).
    # These are overridden per-location for the very large files.
    proxy_http_version 1.1;
    proxy_connect_timeout 15s;
    proxy_send_timeout 30s;
    proxy_read_timeout 120s;         # Increased from 60s; Azure/S3 can be slow or stall mid-transfer
    proxy_buffering on;
    proxy_buffer_size 256k;
    proxy_buffers 8 256k;
    proxy_busy_buffers_size 512k;
    proxy_temp_file_write_size 1m;  # Must be >= largest proxy_buffers / busy size used anywhere (including per-location overrides for big CSVs)

    proxy_set_header Host $proxy_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";

    # Helpful for debugging SNI/Host issues against Azure Front Door etc.
    # You can temporarily change the main log_format to include these.
    # log_format debug_sni '$remote_addr - $time_local "$request" '
    #                      'host=$host ssl_sni=$ssl_server_name upstream=$upstream_addr;';

    # SSL settings for upstream https origins
    proxy_ssl_server_name on;
    proxy_ssl_verify off;   # Gov sites; enable + ca if needed in custom config
    proxy_ssl_protocols TLSv1.2 TLSv1.3;

    # When we internally follow 302s (see @follow_redirect), ignore the target's cache headers
    # so our 24h policy wins. Also prevents Set-Cookie from poisoning cache.
    proxy_ignore_headers Cache-Control Expires Set-Cookie Vary;

    # ------------------------------------------------------------
    # Single server block on port 8080
    # ------------------------------------------------------------
    server {
        listen 8080 default_server;
        server_name _;

        # Simple health endpoint (no caching, fast) — used by compose healthcheck
        location = /health {
            access_log off;
            add_header Cache-Control "no-store";
            return 200 "healthy\n";
        }

        # ------------------------------------------------------------
        # Internal redirect follower (hardened for flaky S3 second hops).
        # Used by the 8 OFAC/Non-SDN locations via "error_page 301 302 ... = @follow_redirect".
        # The origin returns a 302 to a short-lived pre-signed S3 URL; we fetch the final
        # CSV body here. The response is then cached by the *outer* location under the stable
        # /xxx.csv key (so watchman always sees cacheable 200s, never a 302).
        #
        # Hardening applied here (large buffers, 180s read, explicit retries) makes the
        # second-hop S3 fetch far more likely to deliver a *complete* body on cold MISS.
        # This directly addresses "upstream prematurely closed connection" + "unexpected EOF"
        # during initial download of the CONS_* and sdn.* files.
        # ------------------------------------------------------------
        location @follow_redirect {
            internal;

            set $target $upstream_http_location;

            # $target is a full https://... URL (usually S3 or Azure blob with query signature).
            proxy_pass $target;

            # These are required for virtual-hosted S3 buckets and pre-signed URLs.
            proxy_set_header Host $proxy_host;
            proxy_set_header Authorization "";
            proxy_set_header Connection "";

            proxy_ssl_server_name on;
            proxy_ssl_verify off;

            # --- Cold-start resilience for the second-hop fetch (the critical path for
            #     "fetch it on initial download" and "keep the file more often").
            # Large buffers allow the entire ~2 MB response to be held (or spilled to temp
            # file atomically) without truncation. Long read timeout covers slow Azure/S3
            # transfers. Explicit next_upstream retries the S3 hop itself on late close.
            proxy_connect_timeout 20s;
            proxy_read_timeout 180s;
            proxy_send_timeout 60s;

            proxy_buffer_size 512k;
            proxy_buffers 8 512k;
            proxy_busy_buffers_size 1m;
            proxy_temp_file_write_size 1m;

            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
            proxy_next_upstream_tries 3;
        }

        # ------------------------------------------------------------
        # Watchman list file mappings
        # Point *_DOWNLOAD_TEMPLATE / *_DOWNLOAD_URL at http://cache:8080/%s
        # or full URL for non-templated lists (EU, UK, UN, FinCEN).
        # Filenames chosen to match what watchman requests and be unique.
        # ------------------------------------------------------------

        # --- US OFAC (sdn, add, alt, comments) ---
        # These origins return 302 to short-lived pre-signed S3 URLs. We intercept the redirect
        # and fetch the final CSV body inside nginx so:
        #   1. The full payload is cached under the stable /xxx.csv key for 24h
        #   2. watchman never sees a 302 and never makes direct requests to S3 (avoids the
        #      "unexpected EOF", IPv6 unreachable, and max-retries failures seen in logs)
        #   3. All external traffic uses our hardened resolver (ipv6=off) + timeouts + retries
        location = /sdn.csv {
            proxy_pass https://sanctionslistservice.ofac.treas.gov/api/PublicationPreview/exports/sdn.csv;
            proxy_intercept_errors on;
            error_page 301 302 307 308 = @follow_redirect;
            proxy_cache watchman_cache;
            proxy_cache_valid 200 48h;
            add_header X-Cache-Status $upstream_cache_status always;

            # Large-response hardening (matches /consolidated.csv). These 302-to-S3 files
            # previously produced "200 0" (truncated body) on cold MISS. The generous
            # buffers + 180s read + retries on the first hop + @follow_redirect make a
            # complete body far more likely to reach the cache under the stable filename.
            proxy_read_timeout 180s;
            proxy_connect_timeout 20s;
            proxy_send_timeout 60s;
            proxy_buffer_size 512k;
            proxy_buffers 8 512k;
            proxy_busy_buffers_size 1m;
        }
        location = /add.csv {
            proxy_pass https://sanctionslistservice.ofac.treas.gov/api/PublicationPreview/exports/add.csv;
            proxy_intercept_errors on;
            error_page 301 302 307 308 = @follow_redirect;
            proxy_cache watchman_cache;
            proxy_cache_valid 200 48h;
            add_header X-Cache-Status $upstream_cache_status always;

            # Large-response hardening (matches /consolidated.csv). These 302-to-S3 files
            # previously produced "200 0" (truncated body) on cold MISS. The generous
            # buffers + 180s read + retries on the first hop + @follow_redirect make a
            # complete body far more likely to reach the cache under the stable filename.
            proxy_read_timeout 180s;
            proxy_connect_timeout 20s;
            proxy_send_timeout 60s;
            proxy_buffer_size 512k;
            proxy_buffers 8 512k;
            proxy_busy_buffers_size 1m;
        }
        location = /alt.csv {
            proxy_pass https://sanctionslistservice.ofac.treas.gov/api/PublicationPreview/exports/alt.csv;
            proxy_intercept_errors on;
            error_page 301 302 307 308 = @follow_redirect;
            proxy_cache watchman_cache;
            proxy_cache_valid 200 48h;
            add_header X-Cache-Status $upstream_cache_status always;

            # Large-response hardening (matches /consolidated.csv). These 302-to-S3 files
            # previously produced "200 0" (truncated body) on cold MISS. The generous
            # buffers + 180s read + retries on the first hop + @follow_redirect make a
            # complete body far more likely to reach the cache under the stable filename.
            proxy_read_timeout 180s;
            proxy_connect_timeout 20s;
            proxy_send_timeout 60s;
            proxy_buffer_size 512k;
            proxy_buffers 8 512k;
            proxy_busy_buffers_size 1m;
        }
        location = /sdn_comments.csv {
            proxy_pass https://sanctionslistservice.ofac.treas.gov/api/PublicationPreview/exports/sdn_comments.csv;
            proxy_intercept_errors on;
            error_page 301 302 307 308 = @follow_redirect;
            proxy_cache watchman_cache;
            proxy_cache_valid 200 48h;
            add_header X-Cache-Status $upstream_cache_status always;

            # Large-response hardening (matches /consolidated.csv). These 302-to-S3 files
            # previously produced "200 0" (truncated body) on cold MISS. The generous
            # buffers + 180s read + retries on the first hop + @follow_redirect make a
            # complete body far more likely to reach the cache under the stable filename.
            proxy_read_timeout 180s;
            proxy_connect_timeout 20s;
            proxy_send_timeout 60s;
            proxy_buffer_size 512k;
            proxy_buffers 8 512k;
            proxy_busy_buffers_size 1m;
        }

        # --- US Non-SDN (OFAC complementary, uppercase filenames) ---
        location = /CONS_PRIM.CSV {
            proxy_pass https://sanctionslistservice.ofac.treas.gov/api/PublicationPreview/exports/CONS_PRIM.CSV;
            proxy_intercept_errors on;
            error_page 301 302 307 308 = @follow_redirect;
            proxy_cache watchman_cache;
            proxy_cache_valid 200 48h;
            add_header X-Cache-Status $upstream_cache_status always;

            # Large-response hardening (matches /consolidated.csv). These 302-to-S3 files
            # previously produced "200 0" (truncated body) on cold MISS. The generous
            # buffers + 180s read + retries on the first hop + @follow_redirect make a
            # complete body far more likely to reach the cache under the stable filename.
            proxy_read_timeout 180s;
            proxy_connect_timeout 20s;
            proxy_send_timeout 60s;
            proxy_buffer_size 512k;
            proxy_buffers 8 512k;
            proxy_busy_buffers_size 1m;
        }
        location = /CONS_ADD.CSV {
            proxy_pass https://sanctionslistservice.ofac.treas.gov/api/PublicationPreview/exports/CONS_ADD.CSV;
            proxy_intercept_errors on;
            error_page 301 302 307 308 = @follow_redirect;
            proxy_cache watchman_cache;
            proxy_cache_valid 200 48h;
            add_header X-Cache-Status $upstream_cache_status always;

            # Large-response hardening (matches /consolidated.csv). These 302-to-S3 files
            # previously produced "200 0" (truncated body) on cold MISS. The generous
            # buffers + 180s read + retries on the first hop + @follow_redirect make a
            # complete body far more likely to reach the cache under the stable filename.
            proxy_read_timeout 180s;
            proxy_connect_timeout 20s;
            proxy_send_timeout 60s;
            proxy_buffer_size 512k;
            proxy_buffers 8 512k;
            proxy_busy_buffers_size 1m;
        }
        location = /CONS_ALT.CSV {
            proxy_pass https://sanctionslistservice.ofac.treas.gov/api/PublicationPreview/exports/CONS_ALT.CSV;
            proxy_intercept_errors on;
            error_page 301 302 307 308 = @follow_redirect;
            proxy_cache watchman_cache;
            proxy_cache_valid 200 48h;
            add_header X-Cache-Status $upstream_cache_status always;

            # Large-response hardening (matches /consolidated.csv). These 302-to-S3 files
            # previously produced "200 0" (truncated body) on cold MISS. The generous
            # buffers + 180s read + retries on the first hop + @follow_redirect make a
            # complete body far more likely to reach the cache under the stable filename.
            proxy_read_timeout 180s;
            proxy_connect_timeout 20s;
            proxy_send_timeout 60s;
            proxy_buffer_size 512k;
            proxy_buffers 8 512k;
            proxy_busy_buffers_size 1m;
        }
        location = /CONS_COMMENTS.CSV {
            proxy_pass https://sanctionslistservice.ofac.treas.gov/api/PublicationPreview/exports/CONS_COMMENTS.CSV;
            proxy_intercept_errors on;
            error_page 301 302 307 308 = @follow_redirect;
            proxy_cache watchman_cache;
            proxy_cache_valid 200 48h;
            add_header X-Cache-Status $upstream_cache_status always;

            # Large-response hardening (matches /consolidated.csv). These 302-to-S3 files
            # previously produced "200 0" (truncated body) on cold MISS. The generous
            # buffers + 180s read + retries on the first hop + @follow_redirect make a
            # complete body far more likely to reach the cache under the stable filename.
            proxy_read_timeout 180s;
            proxy_connect_timeout 20s;
            proxy_send_timeout 60s;
            proxy_buffer_size 512k;
            proxy_buffers 8 512k;
            proxy_busy_buffers_size 1m;
        }

        # --- US CSL (Consolidated Screening List) ---
        # This is the ~2MB file most frequently implicated in "upstream prematurely closed
        # connection while reading upstream" + "parsing US CSL: failed to parse CSV: unexpected EOF".
        #
        # We use an explicit variable + proxy_ssl_name here because Azure Front Door (the
        # 13.107.25x.x anycast IPs) is sensitive to SNI + Host header. Using the raw
        # proxy_pass hostname + resolver can occasionally result in inconsistent SNI,
        # which contributes to flaky long responses and late connection drops.
        location = /consolidated.csv {
            # Explicit hostname forces reliable SNI + Host header behavior against Azure FD
            set $csl_host "data.trade.gov";
            proxy_pass https://$csl_host/downloadable_consolidated_screening_list/v1/consolidated.csv;

            proxy_ssl_server_name on;
            proxy_ssl_name $csl_host;           # Force correct SNI (the important bit)
            proxy_set_header Host $csl_host;    # Force correct Host (not $proxy_host)

            proxy_intercept_errors on;
            error_page 301 302 307 308 = @follow_redirect;
            proxy_cache watchman_cache;

            # Long TTL here is one of the highest-leverage defenses: once we have one
            # good complete copy, we avoid the flaky origin for days on restarts.
            proxy_cache_valid 200 48h;
            add_header X-Cache-Status $upstream_cache_status always;

            # Per-location overrides for the large file
            proxy_read_timeout 180s;
            proxy_connect_timeout 20s;
            proxy_send_timeout 60s;
            proxy_buffer_size 512k;
            proxy_buffers 8 512k;
            proxy_busy_buffers_size 1m;
        }

        # --- EU CSL (single file, token embedded in URL) ---
        # Can be >1 MB. We apply the same explicit SNI/Host treatment as consolidated.csv
        # for consistency (the EU endpoint has also shown variable behavior on large responses).
        location = /eu_csl.csv {
            set $eu_host "webgate.ec.europa.eu";
            proxy_pass https://$eu_host/fsd/fsf/public/files/csvFullSanctionsList_1_1/content?token=dG9rZW4tMjAxNw;

            proxy_ssl_server_name on;
            proxy_ssl_name $eu_host;
            proxy_set_header Host $eu_host;

            proxy_intercept_errors on;
            error_page 301 302 307 308 = @follow_redirect;
            proxy_cache watchman_cache;
            proxy_cache_valid 200 48h;
            add_header X-Cache-Status $upstream_cache_status always;

            proxy_read_timeout 180s;
            proxy_connect_timeout 20s;
            proxy_buffer_size 512k;
            proxy_buffers 8 512k;
        }

        # --- UK Sanctions List ---
        location = /UK_Sanctions_List.csv {
            proxy_pass https://sanctionslist.fcdo.gov.uk/docs/UK-Sanctions-List.csv;
            proxy_intercept_errors on;
            error_page 301 302 307 308 = @follow_redirect;
            proxy_cache watchman_cache;
            proxy_cache_valid 200 48h;
            add_header X-Cache-Status $upstream_cache_status always;

            # Large-response hardening (matches /consolidated.csv). These 302-to-S3 files
            # previously produced "200 0" (truncated body) on cold MISS. The generous
            # buffers + 180s read + retries on the first hop + @follow_redirect make a
            # complete body far more likely to reach the cache under the stable filename.
            proxy_read_timeout 180s;
            proxy_connect_timeout 20s;
            proxy_send_timeout 60s;
            proxy_buffer_size 512k;
            proxy_buffers 8 512k;
            proxy_busy_buffers_size 1m;
        }

        # --- UN Consolidated List (XML) ---
        location = /un_consolidated.xml {
            proxy_pass https://scsanctions.un.org/resources/xml/en/consolidated.xml;
            proxy_intercept_errors on;
            error_page 301 302 307 308 = @follow_redirect;
            proxy_cache watchman_cache;
            proxy_cache_valid 200 48h;
            add_header X-Cache-Status $upstream_cache_status always;

            # Large-response hardening (matches /consolidated.csv). These 302-to-S3 files
            # previously produced "200 0" (truncated body) on cold MISS. The generous
            # buffers + 180s read + retries on the first hop + @follow_redirect make a
            # complete body far more likely to reach the cache under the stable filename.
            proxy_read_timeout 180s;
            proxy_connect_timeout 20s;
            proxy_send_timeout 60s;
            proxy_buffer_size 512k;
            proxy_buffers 8 512k;
            proxy_busy_buffers_size 1m;
        }

        # --- FinCEN 311 (HTML page) ---
        # Observed returning 301 in some runs; the follower will turn it into a clean 200.
        location = /fincen_311.html {
            proxy_pass https://www.fincen.gov/resources/statutes-and-regulations/311-and-9714-special-measures;
            proxy_intercept_errors on;
            error_page 301 302 307 308 = @follow_redirect;
            proxy_cache watchman_cache;
            proxy_cache_valid 200 48h;
            add_header X-Cache-Status $upstream_cache_status always;

            # Large-response hardening (matches /consolidated.csv). These 302-to-S3 files
            # previously produced "200 0" (truncated body) on cold MISS. The generous
            # buffers + 180s read + retries on the first hop + @follow_redirect make a
            # complete body far more likely to reach the cache under the stable filename.
            proxy_read_timeout 180s;
            proxy_connect_timeout 20s;
            proxy_send_timeout 60s;
            proxy_buffer_size 512k;
            proxy_buffers 8 512k;
            proxy_busy_buffers_size 1m;
        }

        # Default: deny everything else (prevent open proxy)
        location / {
            return 404 "Unknown list file. See supported paths in nginx.conf or README.\n";
        }
    }
}
